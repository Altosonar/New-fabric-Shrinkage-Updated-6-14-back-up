<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wash Processes Dropdown Preview</title>
    <style>
        :root {
            --primary: #2563eb;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --danger: #ef4444;
            --success: #22c55e;
            --secondary: #f3f4f6;
            --info-light: #93c5fd;
            --danger-light: #fecaca;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f8fafc;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .wash-icon {
            color: var(--primary);
            margin-right: 8px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            background-color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        optgroup {
            font-weight: 600;
            color: #374151;
            background-color: #f9fafb;
        }

        option {
            font-weight: normal;
            color: #4b5563;
            padding: 4px 8px;
        }

        option:hover {
            background-color: #e5e7eb;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: var(--secondary);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .note {
            margin-top: 20px;
            padding: 15px;
            background: #e0f2fe;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
        }

        .note h3 {
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        .note p {
            margin: 0;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧼 Wash Processes Dropdown</h1>
        <p class="subtitle">Cleaned and organized dropdown with no duplicate content</p>

        <div class="form-group">
            <label>
                <i class="wash-icon">🧼</i>
                Wash Process
            </label>
            <select id="washSelect">
                <!-- Standard Washes -->
                <optgroup label="Standard Washes">
                    <option value="">-- Select a Process --</option>
                    <option value="Raw Wash / Rinse">Raw Wash / Rinse</option>
                    <option value="Normal Machine Wash">Normal Machine Wash</option>
                    <option value="Silicone / Softener Wash">Silicone / Softener Wash</option>
                </optgroup>

                <!-- Abrasion & Stone Washes -->
                <optgroup label="Abrasion & Stone Washes">
                    <option value="Stone Wash">Stone Wash</option>
                    <option value="Enzyme Wash">Enzyme Wash</option>
                    <option value="Enzyme Stone Wash">Enzyme Stone Wash</option>
                    <option value="Sand Wash">Sand Wash</option>
                </optgroup>

                <!-- Chemical & Distressed -->
                <optgroup label="Chemical & Distressed">
                    <option value="Acid Wash">Acid Wash</option>
                    <option value="Bleach Wash">Bleach Wash</option>
                    <option value="Snow Wash">Snow Wash</option>
                    <option value="Mineral Wash">Mineral Wash</option>
                    <option value="Vintage / Destroy Wash">Vintage / Destroy Wash</option>
                </optgroup>

                <!-- Garment Dye Processes (High Heat) -->
                <optgroup label="Garment Dye Processes (High Heat)">
                    <option value="Pigment Dye">Pigment Dye</option>
                    <option value="Reactive Dye">Reactive Dye</option>
                    <option value="Sulfur Dye">Sulfur Dye</option>
                    <option value="Direct Dye">Direct Dye</option>
                    <option value="Tie Dye / Dip Dye">Tie Dye / Dip Dye</option>
                </optgroup>

                <!-- Custom -->
                <optgroup label="Custom">
                    <option value="Other">Other (Custom Entry)...</option>
                </optgroup>
            </select>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">19</div>
                <div class="stat-label">Total Options</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">5</div>
                <div class="stat-label">Groups</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">Duplicates</div>
            </div>
        </div>

        <div class="note">
            <h3>✨ What's Improved</h3>
            <p><strong>Before:</strong> Duplicate entries and inconsistent grouping</p>
            <p><strong>After:</strong> Clean, organized dropdown with logical grouping and no duplicates</p>
        </div>
    </div>

    <script>
        const select = document.getElementById('washSelect');
        const options = Array.from(select.querySelectorAll('option'));
        
        select.addEventListener('change', function() {
            const selected = this.value;
            if (selected) {
                const selectedOption = options.find(opt => opt.value === selected);
                const group = selectedOption.parentElement.label;
                console.log(`Selected: ${selected} (Group: ${group})`);
            }
        });
    </script>
</body>
</html>
